<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>BRIDGE OS — Consola de Guardia</title>
<meta name="description" content="Consola de guardia para oficiales de navegación: checklist por fases, referencia rápida (RIPA, IALA-B, VHF, SMCP) y calculadoras náuticas.">
<meta name="theme-color" content="#070b14" id="metaTheme">
<link rel="manifest" href="manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bridge OS">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/svg+xml" href="icons/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* ----- NIGHT (default) ----- */
    --bg:#070b14; --bg-2:#0a1120; --grad-top:#0d1830;
    --surface:#0f1a2e; --surface-2:#0c1322; --surface-3:#16233e; --inset:#091020;
    --line:#1c2b48; --line-2:#28395d;
    --text:#e9f1fc; --text-dim:#8094b4; --text-faint:#5b6e90;
    --accent:#36d6f0; --accent-2:#1bb8d6; --accent-ink:#04222b;
    --amber:#f7b84b; --green:#37d39b; --red:#ff5c63; --violet:#9d8cff;
    --tag-alpha:18%;
    --shadow:0 18px 40px -22px rgba(0,0,0,.85);
    --shadow-sm:0 8px 22px -16px rgba(0,0,0,.8);
    --shadow-up:0 -10px 30px -18px rgba(0,0,0,.7);
    --radius:16px; --radius-sm:11px; --radius-xs:8px;
    --ff:'Chakra Petch',system-ui,-apple-system,sans-serif;
    --fm:'IBM Plex Mono',ui-monospace,SFMono-Regular,monospace;
  }
  :root[data-theme="day"]{
    --bg:#e9eef6; --bg-2:#e2e9f3; --grad-top:#fbfcfe;
    --surface:#ffffff; --surface-2:#f2f6fc; --surface-3:#e9f0f9; --inset:#eef3fa;
    --line:#d8e0ee; --line-2:#c2d0e3;
    --text:#0f1d33; --text-dim:#566a87; --text-faint:#8696ad;
    --accent:#0b8fb0; --accent-2:#0a7a98; --accent-ink:#ffffff;
    --amber:#b9740b; --green:#0e9d6b; --red:#d8383d; --violet:#6a53d3;
    --tag-alpha:13%;
    --shadow:0 18px 38px -24px rgba(23,49,92,.42);
    --shadow-sm:0 8px 20px -16px rgba(23,49,92,.34);
    --shadow-up:0 -10px 28px -20px rgba(23,49,92,.22);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
  body{
    font-family:var(--ff); background:var(--bg); color:var(--text);
    min-height:100vh; line-height:1.5; overflow-x:hidden;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    transition:background .3s ease,color .3s ease;
  }
  .mono{font-family:var(--fm)}

  /* atmospheric backdrop */
  .atmosphere{
    position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:
      radial-gradient(900px 520px at 78% -8%, color-mix(in srgb,var(--accent) 14%,transparent), transparent 60%),
      radial-gradient(760px 480px at -12% 8%, color-mix(in srgb,var(--violet) 12%,transparent), transparent 58%),
      linear-gradient(180deg,var(--bg-2),var(--bg));
  }
  .atmosphere::after{
    content:''; position:absolute; inset:0; opacity:.5;
    background-image:
      linear-gradient(color-mix(in srgb,var(--accent) 7%,transparent) 1px,transparent 1px),
      linear-gradient(90deg,color-mix(in srgb,var(--accent) 7%,transparent) 1px,transparent 1px);
    background-size:34px 34px;
    -webkit-mask-image:radial-gradient(120% 90% at 50% 0%,#000,transparent 75%);
            mask-image:radial-gradient(120% 90% at 50% 0%,#000,transparent 75%);
  }

  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  ::-webkit-scrollbar{width:7px;height:7px}
  ::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:99px}
  ::-webkit-scrollbar-track{background:transparent}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
  button{font-family:inherit}

  /* ===================== APP BAR ===================== */
  .appbar{
    position:sticky; top:0; z-index:60;
    padding:calc(env(safe-area-inset-top,0px) + 12px) 14px 12px;
    background:linear-gradient(180deg,var(--grad-top),var(--bg));
    border-bottom:1px solid var(--line);
    box-shadow:var(--shadow-sm);
  }
  .appbar-row{display:flex;align-items:center;gap:12px}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .brandmark{
    position:relative; width:42px; height:42px; flex-shrink:0; color:var(--accent);
    display:grid; place-items:center; border-radius:13px;
    background:radial-gradient(circle at 50% 35%,color-mix(in srgb,var(--accent) 16%,transparent),var(--inset) 72%);
    border:1px solid color-mix(in srgb,var(--accent) 38%,var(--line));
    box-shadow:inset 0 0 14px -6px color-mix(in srgb,var(--accent) 90%,transparent);
    overflow:hidden;
  }
  .brandmark svg{position:relative;z-index:2;display:block}
  .brandmark .sweep{
    position:absolute; inset:-25%; z-index:1; border-radius:50%;
    background:conic-gradient(from 0deg,color-mix(in srgb,var(--accent) 55%,transparent),transparent 30%);
    animation:sweep 4.2s linear infinite; opacity:.55;
  }
  @keyframes sweep{to{transform:rotate(360deg)}}
  .brand-txt{min-width:0}
  .brand-txt h1{
    font-size:18px; font-weight:700; letter-spacing:2.5px; line-height:1; color:var(--text);
    white-space:nowrap;
  }
  .brand-sub{
    display:block; font-size:9.5px; letter-spacing:1.4px; text-transform:uppercase;
    color:var(--text-dim); margin-top:4px; font-weight:500;
  }
  .appbar-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
  .clock-wrap{text-align:right;display:flex;flex-direction:column;line-height:1.1;margin-right:2px}
  .clock-wrap .clock{font-family:var(--fm);font-size:13px;font-weight:600;color:var(--accent);letter-spacing:.5px}
  .clock-wrap .zone{font-size:8px;letter-spacing:.8px;color:var(--text-faint);text-transform:uppercase;margin-top:3px}
  .icon-btn{
    width:38px;height:38px;flex-shrink:0;border-radius:11px;cursor:pointer;
    background:var(--surface-3);border:1px solid var(--line-2);color:var(--text-dim);
    font-size:16px;display:grid;place-items:center;transition:.15s;
  }
  .icon-btn:hover{color:var(--accent);border-color:color-mix(in srgb,var(--accent) 55%,var(--line-2))}
  .icon-btn:active{transform:scale(.92)}
  .icon-btn.danger:hover{color:var(--red);border-color:color-mix(in srgb,var(--red) 55%,var(--line-2))}

  .progress{margin-top:13px;display:flex;align-items:center;gap:11px}
  .progress-track{
    flex:1;height:9px;border-radius:99px;background:var(--inset);
    border:1px solid var(--line);overflow:hidden;position:relative;
  }
  .progress-fill{
    height:100%;border-radius:99px;
    background:linear-gradient(90deg,var(--accent-2),var(--accent));
    box-shadow:0 0 12px -2px color-mix(in srgb,var(--accent) 90%,transparent);
    transition:width .5s cubic-bezier(.4,0,.2,1);
  }
  .progress-pct{font-family:var(--fm);font-size:13px;font-weight:600;color:var(--accent);min-width:42px;text-align:right}

  .search{position:relative;margin-top:11px}
  .search-ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-faint);pointer-events:none}
  .search input{
    width:100%;padding:11px 14px 11px 40px;border-radius:12px;
    border:1px solid var(--line);background:var(--inset);color:var(--text);
    font-family:var(--ff);font-size:13.5px;outline:none;transition:.15s;
  }
  .search input::placeholder{color:var(--text-faint)}
  .search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 18%,transparent)}

  /* ===================== MAIN ===================== */
  .wrap{max-width:740px;margin:0 auto;padding:18px 14px calc(96px + env(safe-area-inset-bottom,0px));position:relative;z-index:1}
  .hide{display:none!important}
  .section-label{
    font-family:var(--fm);font-size:10px;font-weight:600;letter-spacing:2px;
    text-transform:uppercase;color:var(--accent);margin:2px 0 14px;display:flex;align-items:center;gap:8px;
  }
  .section-label::before{content:'';width:18px;height:2px;border-radius:2px;background:var(--accent)}

  /* stat chips */
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:18px}
  .stat-card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);
    padding:12px 6px 10px;text-align:center;position:relative;overflow:hidden;box-shadow:var(--shadow-sm);
  }
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:currentColor;opacity:.6}
  .stat-card .v{font-family:var(--fm);font-size:21px;font-weight:600;line-height:1}
  .stat-card .l{font-size:8.5px;color:var(--text-dim);margin-top:5px;text-transform:uppercase;letter-spacing:.6px;font-weight:500}

  /* phase cards */
  .phase{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    margin-bottom:12px;overflow:hidden;position:relative;box-shadow:var(--shadow-sm);
    transition:border-color .2s,box-shadow .2s;
  }
  .phase::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:currentColor;opacity:.7}
  .phase:hover{border-color:color-mix(in srgb,currentColor 35%,var(--line))}
  .phase.alarm-phase{border-color:color-mix(in srgb,var(--red) 38%,var(--line))}

  .phase-head{display:flex;align-items:center;gap:12px;padding:14px 15px;cursor:pointer;user-select:none}
  .phase-num{
    font-family:var(--fm);font-size:15px;font-weight:600;width:42px;height:42px;flex-shrink:0;
    border-radius:11px;display:flex;align-items:center;justify-content:center;color:currentColor;
    background:color-mix(in srgb,currentColor 12%,transparent);
    border:1px solid color-mix(in srgb,currentColor 32%,transparent);
  }
  .phase-icon{
    font-size:17px;flex-shrink:0;width:30px;height:30px;border-radius:9px;display:grid;place-items:center;
    background:color-mix(in srgb,currentColor 9%,transparent);
  }
  .phase-info{flex:1;min-width:0}
  .phase-info h3{font-size:14px;font-weight:600;letter-spacing:.4px;color:var(--text)}
  .phase-info p{font-size:11.5px;color:var(--text-dim);margin-top:2px;font-weight:400}
  .phase-chev{color:var(--text-faint);font-size:11px;transition:transform .25s;flex-shrink:0;width:24px;text-align:center}
  .phase-chev.open{transform:rotate(180deg);color:currentColor}

  .phase-prog-mini{padding:0 15px 13px}
  .mini-track{height:5px;border-radius:99px;background:var(--inset);border:1px solid var(--line);overflow:hidden}
  .mini-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
  .mini-label{font-family:var(--fm);font-size:10px;color:var(--text-dim);margin-top:6px;letter-spacing:.3px}

  .phase-body{display:none;border-top:1px solid var(--line);background:color-mix(in srgb,var(--inset) 45%,var(--surface))}
  .phase-body.open{display:block;animation:fadeIn .25s ease}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}

  .group-title{
    padding:13px 15px 7px;font-family:var(--fm);font-size:10px;font-weight:600;
    letter-spacing:1.2px;text-transform:uppercase;color:var(--accent);
    display:flex;align-items:center;gap:7px;
  }
  .group-title::before{content:'';width:5px;height:5px;border-radius:1px;background:var(--accent);transform:rotate(45deg)}

  .item{padding:11px 15px;border-top:1px solid var(--line);display:flex;gap:12px;align-items:flex-start}
  .item:first-of-type{border-top:none}
  .item-check{
    width:23px;height:23px;border-radius:7px;border:1.5px solid var(--line-2);flex-shrink:0;margin-top:1px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--inset);transition:.18s;
  }
  .item-check:hover{border-color:var(--green)}
  .item-check.done{background:var(--green);border-color:var(--green);box-shadow:0 0 12px -3px var(--green)}
  .item-check.done::after{content:'✓';color:#03150e;font-size:13px;font-weight:800;animation:pop .2s ease}
  @keyframes pop{0%{transform:scale(.4);opacity:0}100%{transform:scale(1);opacity:1}}
  .item-body{flex:1;min-width:0}
  .item-text{font-size:13px;line-height:1.58;color:var(--text)}
  .item-text.done{color:var(--text-faint);text-decoration:line-through}
  .item-tip{
    margin-top:7px;font-size:11.5px;line-height:1.5;border-radius:var(--radius-xs);
    background:color-mix(in srgb,var(--amber) 11%,transparent);
    border-left:2px solid var(--amber);padding:7px 10px;
    color:color-mix(in srgb,var(--amber) 78%,var(--text));
  }
  .item-tip::before{content:'⚡ '}
  .item-tags{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
  .tag{
    font-family:var(--fm);font-size:9px;font-weight:600;padding:3px 9px;border-radius:99px;
    letter-spacing:.3px;color:currentColor;
    background:color-mix(in srgb,currentColor var(--tag-alpha),transparent);
    border:1px solid color-mix(in srgb,currentColor 30%,transparent);
  }

  /* reference cards */
  .ref-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow-sm)}
  .ref-head{padding:14px 15px;display:flex;align-items:center;gap:11px;cursor:pointer;user-select:none}
  .ref-head>span:first-child{font-size:18px;width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:var(--surface-3);flex-shrink:0}
  .ref-head h4{font-size:13.5px;font-weight:600;flex:1;letter-spacing:.3px}
  .ref-body{display:none;padding:2px 15px 15px;border-top:1px solid var(--line)}
  .ref-body.open{display:block;animation:fadeIn .25s ease}

  .buoy-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}
  .buoy-box{border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px;text-align:center;background:var(--inset)}
  .buoy-box .bname{font-size:10px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.4px}
  .buoy-box .bcolor{font-family:var(--fm);font-size:16px;font-weight:600;margin-top:5px}
  .buoy-box .bshape{font-size:10px;margin-top:4px;color:var(--text-dim)}

  .sound-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px}
  .sound-box{background:var(--inset);border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 11px;display:flex;align-items:center;gap:10px}
  .sound-box .dots{font-family:var(--fm);font-size:14px;color:var(--accent);font-weight:600;min-width:32px}
  .sound-box .meaning{font-size:11px;line-height:1.3}

  .vhf-box{background:var(--inset);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 13px;margin-top:11px;border-left:3px solid currentColor}
  .vhf-box .label{font-size:11.5px;font-weight:700;font-family:var(--fm)}
  .vhf-box .body{font-size:11.5px;line-height:1.55;margin-top:5px;color:var(--text)}
  .vhf-box .who{font-size:10px;color:var(--text-dim);margin-top:5px}

  .simple-list{margin-top:12px}
  .simple-row{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-top:1px solid var(--line);font-size:12.5px}
  .simple-row:first-child{border-top:none}
  .simple-row .k{font-weight:500;flex-shrink:0;color:var(--text)}
  .simple-row .v2{color:var(--accent);text-align:right;font-family:var(--fm);font-size:12px}

  /* calculators */
  .calc-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:17px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
  .calc-card h4{font-size:14px;font-weight:600;display:flex;align-items:center;gap:9px;letter-spacing:.3px}
  .calc-card .calc-desc{font-size:11.5px;color:var(--text-dim);margin-top:4px;margin-bottom:14px}
  .calc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:11px}
  .calc-field{display:flex;flex-direction:column;gap:5px}
  .calc-field label{font-size:9.5px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.4px}
  .calc-field input{
    padding:10px 12px;border:1px solid var(--line);border-radius:var(--radius-xs);font-size:14px;
    background:var(--inset);color:var(--text);outline:none;font-family:var(--fm);transition:.15s;
  }
  .calc-field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 16%,transparent)}
  .calc-btn{
    margin-top:14px;padding:11px 20px;border-radius:var(--radius-xs);border:none;cursor:pointer;
    background:linear-gradient(90deg,var(--accent-2),var(--accent));color:var(--accent-ink);
    font-size:12.5px;font-weight:700;font-family:var(--ff);letter-spacing:.5px;text-transform:uppercase;transition:.15s;
  }
  .calc-btn:hover{box-shadow:0 8px 22px -10px var(--accent);transform:translateY(-1px)}
  .calc-btn:active{transform:translateY(0)}
  .calc-result{
    margin-top:14px;background:var(--inset);border:1px solid var(--line);border-left:3px solid var(--accent);
    border-radius:var(--radius-xs);padding:12px 15px;font-size:13px;line-height:1.65;display:none;
  }
  .calc-result.show{display:block;animation:fadeIn .2s ease}
  .calc-result.err{border-left-color:var(--red);color:var(--red)}

  .empty-state{text-align:center;padding:60px 20px;color:var(--text-dim)}
  .empty-state .ic{font-size:34px;margin-bottom:12px;opacity:.5}
  .empty-state p{font-size:12.5px;font-family:var(--fm)}

  /* ===================== BOTTOM NAV ===================== */
  .bottomnav{
    position:fixed;left:0;right:0;bottom:0;z-index:60;display:flex;
    padding:8px 10px calc(env(safe-area-inset-bottom,0px) + 8px);gap:4px;
    background:linear-gradient(180deg,color-mix(in srgb,var(--surface) 80%,transparent),var(--surface));
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-top:1px solid var(--line);box-shadow:var(--shadow-up);
  }
  .nav-tab{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
    padding:7px 4px 5px;border:none;background:transparent;cursor:pointer;border-radius:12px;
    color:var(--text-faint);font-size:10.5px;font-weight:600;letter-spacing:.2px;
    position:relative;transition:color .15s;
  }
  .nav-tab svg{width:23px;height:23px;display:block}
  .nav-tab span{line-height:1}
  .nav-tab:hover{color:var(--text-dim)}
  .nav-tab.active{color:var(--accent)}
  .nav-tab.active::before{
    content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);
    width:26px;height:3px;border-radius:99px;background:var(--accent);
    box-shadow:0 0 10px -1px var(--accent);
  }
  .nav-tab.active svg{filter:drop-shadow(0 0 7px color-mix(in srgb,var(--accent) 60%,transparent))}
</style>
</head>
<body>

<div class="atmosphere" aria-hidden="true"></div>

<header class="appbar">
  <div class="appbar-row">
    <div class="brand">
      <div class="brandmark">
        <span class="sweep"></span>
        <svg viewBox="0 0 48 48" width="28" height="28" aria-hidden="true">
          <circle cx="24" cy="24" r="21" fill="none" stroke="currentColor" stroke-opacity=".45" stroke-width="2"/>
          <polygon points="24,5 28,24 24,43 20,24" fill="currentColor"/>
          <polygon points="5,24 24,20 43,24 24,28" fill="currentColor" opacity=".5"/>
          <circle cx="24" cy="24" r="3.4" fill="var(--amber)"/>
        </svg>
      </div>
      <div class="brand-txt">
        <h1>BRIDGE&nbsp;OS</h1>
        <span class="brand-sub">Consola de Guardia</span>
      </div>
    </div>
    <div class="appbar-actions">
      <div class="clock-wrap">
        <span class="clock mono" id="clock">--:--:--</span>
        <span class="zone">UTC · IALA-B</span>
      </div>
      <button class="icon-btn" id="themeBtn" type="button" title="Día / Noche" aria-label="Cambiar tema día/noche">☾</button>
      <button class="icon-btn danger" id="resetBtn" type="button" title="Nueva guardia" aria-label="Reiniciar y empezar nueva guardia">⟲</button>
    </div>
  </div>

  <div class="progress">
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <span class="progress-pct mono" id="progressPct">0%</span>
  </div>

<script>
// ============ ESTADO ============
let checkState = {};
let openPhases = {};
let currentPage = 'checklist';
let searchTerm = '';
const STORAGE_KEY = 'guardia-check-v1';

const COLOR_TAGS = {
  default: { fg: '#0c4a6e', bg: '#dbeafe' },
};

function tagColor(tag) {
  if (/RIPA/.test(tag)) return { fg: '#ff5c63', bg: 'transparent' };
  if (/SOLAS|STCW/.test(tag)) return { fg: '#36d6f0', bg: 'transparent' };
  if (/SHOA|MAREA|AGUAS|UKC|GUINDA|ESTAB/.test(tag)) return { fg: '#37d39b', bg: 'transparent' };
  if (/FONDEO|AMARRE|CUBIERTA|ATRAQUE|DESATRAQUE|LEVAR|VIGILANCIA|PUERTO|BANDERAS/.test(tag)) return { fg: '#f7b84b', bg: 'transparent' };
  if (/MAYDAY|PAN-PAN|SECURITÉ|GMDSS|DIRECTEMAR|MOB|INCENDIO|ABANDONO|COLISIÓN|VARADA|DERRAME|MÉDICA|SAR/.test(tag)) return { fg: '#ff5c63', bg: 'transparent' };
  if (/IALA|ETA|RUMBOS|CINEMÁTICA|GPS|AIS|ECOSONDA|POSICIÓN|NOCTURNA|HIELOS|EMERGENCIA|VTS|HORA OFICIAL|METEO|SMCP|PILOTAJE|OACI/.test(tag)) return { fg: '#f7b84b', bg: 'transparent' };
  return { fg: '#36d6f0', bg: 'transparent' };
}

// ============ PERSISTENCIA ============
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) checkState = JSON.parse(raw) || {};
  } catch (e) {
    checkState = {};
  }
  initCheckDefaults();
  render();
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(checkState));
  } catch (e) {
    console.error('No se pudo guardar el progreso', e);
  }
}

// ============ TEMA DÍA / NOCHE ============
const THEME_KEY = 'bridge-theme-v1';
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  const meta = document.getElementById('metaTheme');
  if (meta) meta.setAttribute('content', t === 'day' ? '#e9eef6' : '#070b14');
  const btn = document.getElementById('themeBtn');
  if (btn) { btn.textContent = t === 'day' ? '☀' : '☾'; }
}
function initTheme() {
  let t = 'night';
  try { t = localStorage.getItem(THEME_KEY) || 'night'; } catch (e) {}
  applyTheme(t);
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') === 'day' ? 'day' : 'night';
  const next = cur === 'day' ? 'night' : 'day';
  try { localStorage.setItem(THEME_KEY, next); } catch (e) {}
  applyTheme(next);
}

function initCheckDefaults() {
  FASES.forEach(f => {
    f.grupos.forEach((g, gi) => {
      g.items.forEach((it, ii) => {
        const key = `${f.id}-${gi}-${ii}`;
        if (!(key in checkState)) checkState[key] = false;
      });
    });
  });
}

function totalItemsCount() {
  let n = 0;
  FASES.forEach(f => f.grupos.forEach(g => n += g.items.length));
  return n;
}

function doneItemsCount() {
  return Object.values(checkState).filter(v => v).length;
}

function phaseStats(f) {
  let total = 0, done = 0;
  f.grupos.forEach((g, gi) => g.items.forEach((it, ii) => {
    total++;
    if (checkState[`${f.id}-${gi}-${ii}`]) done++;
  }));
  return { total, done };
}

// ============ CLOCK ============
function updateClock() {
  const now = new Date();
  const h = String(now.getUTCHours()).padStart(2, '0');
  const m = String(now.getUTCMinutes()).padStart(2, '0');
  const s = String(now.getUTCSeconds()).padStart(2, '0');
  const el = document.getElementById('clock');
  if (el) el.textContent = `${h}:${m}:${s}`;
}

let compassDeg = 0;
function spinCompass() {
  compassDeg += 90;
  const el = document.getElementById('compassNeedle');
  if (el) el.style.transform = `rotate(${compassDeg}deg)`;

  { id: 'referencia', label: 'Referencia', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6.4C10.4 5 7.8 4.5 4 4.7V18c3.8-.2 6.4.3 8 1.7 1.6-1.4 4.2-1.9 8-1.7V4.7c-3.8-.2-6.4.3-8 1.7z"/><line x1="12" y1="6.4" x2="12" y2="19.7"/></svg>' },

];

function renderTabs() {
  const nav = document.getElementById('navTabs');
  nav.innerHTML = TABS.map(t => `
    <button type="button" class="nav-tab ${t.id === currentPage ? 'active' : ''}" data-page="${t.id}" aria-label="${t.label}">${t.icon}<span>${t.label}</span></button>
  `).join('');
  nav.querySelectorAll('.nav-tab').forEach(el => {
    el.addEventListener('click', () => {
      currentPage = el.dataset.page;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

}

function showPage(page) {
  ['checklist', 'referencia', 'calculadoras'].forEach(p => {
    document.getElementById('page-' + p).classList.toggle('hide', p !== page);
  });
}

// ============ RENDER: HEADER STATS ============
function renderHeaderStats() {
  const total = totalItemsCount();
  const done = doneItemsCount();
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('statHechos').textContent = done;
  document.getElementById('statTotal').textContent = total;
}

// ============ RENDER: CHECKLIST ============
function matchesSearch(text) {
  if (!searchTerm) return true;
  return text.toLowerCase().includes(searchTerm.toLowerCase());
}

function phaseMatchesSearch(f) {
  if (!searchTerm) return true;
  const term = searchTerm.toLowerCase();
  if (f.nombre.toLowerCase().includes(term) || f.desc.toLowerCase().includes(term)) return true;
  return f.grupos.some(g =>
    g.titulo.toLowerCase().includes(term) ||
    g.items.some(it =>
      it.t.toLowerCase().includes(term) ||
      (it.tip && it.tip.toLowerCase().includes(term)) ||
      (it.tags && it.tags.some(tg => tg.toLowerCase().includes(term)))
    )
  );
}

function itemMatchesSearch(it, groupTitle, phaseNombre) {
  if (!searchTerm) return true;
  const term = searchTerm.toLowerCase();
  return it.t.toLowerCase().includes(term) ||
    (it.tip && it.tip.toLowerCase().includes(term)) ||
    (it.tags && it.tags.some(tg => tg.toLowerCase().includes(term))) ||
    groupTitle.toLowerCase().includes(term) ||
    phaseNombre.toLowerCase().includes(term);
}

function renderChecklist() {
  const container = document.getElementById('phasesContainer');
  const visiblePhases = FASES.filter(phaseMatchesSearch);
  document.getElementById('emptySearch').classList.toggle('hide', visiblePhases.length > 0);
  container.innerHTML = visiblePhases.map(f => renderPhaseCard(f)).join('');

  // attach listeners
  visiblePhases.forEach(f => {
    const head = document.getElementById(`phase-head-${f.id}`);
    if (head) head.addEventListener('click', () => {
      openPhases[f.id] = !openPhases[f.id];
      renderChecklist();
    });
  });

  container.querySelectorAll('.item-check').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const key = el.dataset.key;
      checkState[key] = !checkState[key];
      saveState();
      renderHeaderStats();
      renderChecklist();
    });
  });
}

// Mapea los colores "claros" definidos en data.js a la paleta de consola/radar
function consoleColor(hexClaro) {
  const map = {
    '#0c4a6e': '#36d6f0',   // azul → cian instrumento
    '#1a7a4c': '#37d39b',   // verde → verde mar
    '#c8830a': '#f7b84b',   // ámbar → ámbar
    '#c4342f': '#ff5c63',   // rojo → alarma
    '#6b4c9a': '#9d8cff',   // morado → violeta
  };
  return map[hexClaro] || '#36d6f0';
}

function renderPhaseCard(f) {
  const { total, done } = phaseStats(f);
  const pct = total ? Math.round((done / total) * 100) : 0;
  const isOpen = !!openPhases[f.id] || !!searchTerm;
  const cc = consoleColor(f.color);
  const isAlarmPhase = f.id === 10; // fase de emergencias

  let bodyHtml = '';
  f.grupos.forEach((g, gi) => {
    const itemsHtml = g.items
      .map((it, ii) => ({ it, ii }))
      .filter(({ it }) => itemMatchesSearch(it, g.titulo, f.nombre))
      .map(({ it, ii }) => {
        const key = `${f.id}-${gi}-${ii}`;
        const done = checkState[key];
        const tagsHtml = (it.tags || []).map(tg => {
          const c = tagColor(tg);
          return `<span class="tag" style="color:${c.fg}">${escapeHtml(tg)}</span>`;
        }).join('');
        return `
        <div class="item">
          <div class="item-check ${done ? 'done' : ''}" data-key="${key}"></div>
          <div class="item-body">
            <div class="item-text ${done ? 'done' : ''}">${escapeHtml(it.t)}</div>
            ${it.tip ? `<div class="item-tip">${escapeHtml(it.tip)}</div>` : ''}
            ${tagsHtml ? `<div class="item-tags">${tagsHtml}</div>` : ''}
          </div>
        </div>`;
      }).join('');
    if (!itemsHtml) return;
    bodyHtml += `<div class="group-title">${escapeHtml(g.titulo)}</div>${itemsHtml}`;
  });

  return `
  <div class="phase ${isAlarmPhase ? 'alarm-phase' : ''}" style="color:${cc}">
    <div class="phase-head" id="phase-head-${f.id}">
      <div class="phase-num">${f.num}</div>
      <div class="phase-icon">${f.icon}</div>
      <div class="phase-info" style="color:var(--text)">
        <h3>${escapeHtml(f.nombre)}</h3>
        <p>${escapeHtml(f.desc)}</p>
      </div>
      <div class="phase-chev ${isOpen ? 'open' : ''}">▼</div>
    </div>
    <div class="phase-prog-mini">
      <div class="mini-track"><div class="mini-fill" style="width:${pct}%;background:${cc}"></div></div>
      <div class="mini-label">${done}/${total} · ${pct}%</div>
    </div>
    <div class="phase-body ${isOpen ? 'open' : ''}">${bodyHtml}</div>
  </div>`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ============ RENDER: REFERENCIA ============
let openRef = {};

function renderReferencia() {
  const container = document.getElementById('refContainer');
  container.innerHTML = REFERENCIA.map(r => renderRefCard(r)).join('');
  REFERENCIA.forEach(r => {
    const head = document.getElementById(`ref-head-${r.id}`);
    if (head) head.addEventListener('click', () => {
      openRef[r.id] = !openRef[r.id];
      renderReferencia();
    });
  });
}

function renderRefCard(r) {
  const isOpen = !!openRef[r.id];
  let inner = '';

  if (r.tipo === 'buoy') {
    inner += `<div class="buoy-grid">` + r.buoys.map(b => `
      <div class="buoy-box" style="border-color:${b.colorHex}">
        <div class="bname">${escapeHtml(b.name)}</div>
        <div class="bcolor" style="color:${b.colorHex};text-shadow:0 0 8px ${b.colorHex}66">${escapeHtml(b.color)}</div>
        <div class="bshape">${escapeHtml(b.shape)}</div>
      </div>`).join('') + `</div>`;
    inner += `<div class="simple-list">` + r.extra.map(e => `
      <div class="simple-row"><div class="k">${escapeHtml(e.k)}</div><div class="v2">${escapeHtml(e.v)}</div></div>`).join('') + `</div>`;
  } else if (r.tipo === 'sound') {
    inner += `<div class="sound-grid">` + r.sounds.map(s => `
      <div class="sound-box"><div class="dots">${escapeHtml(s.dots)}</div><div class="meaning">${escapeHtml(s.meaning)}</div></div>`).join('') + `</div>`;
    inner += `<div class="simple-list">` + r.extra.map(e => `
      <div class="simple-row"><div class="k">${escapeHtml(e.k)}</div><div class="v2">${escapeHtml(e.v)}</div></div>`).join('') + `</div>`;
  } else if (r.tipo === 'vhf') {
    inner += r.vhf.map(v => `
      <div class="vhf-box" style="border-left:4px solid ${v.color}">
        <div class="label">${v.label}</div>
        <div class="body">${escapeHtml(v.body)}</div>
        <div class="who">${escapeHtml(v.who)}</div>
      </div>`).join('');
    if (r.nota) inner += `<div class="item-tip" style="margin-top:10px">${escapeHtml(r.nota)}</div>`;
  } else if (r.tipo === 'simple') {
    inner += `<div class="simple-list">` + r.rows.map(row => `
      <div class="simple-row"><div class="k">${escapeHtml(row.k)}</div><div class="v2">${escapeHtml(row.v)}</div></div>`).join('') + `</div>`;
    if (r.nota) inner += `<div class="item-tip" style="margin-top:10px">${escapeHtml(r.nota)}</div>`;
  }

  return `
  <div class="ref-card">
    <div class="ref-head" id="ref-head-${r.id}">
      <span style="font-size:18px">${r.icon}</span>
      <h4>${escapeHtml(r.titulo)}</h4>
      <span class="phase-chev ${isOpen ? 'open' : ''}">▼</span>
    </div>
    <div class="ref-body ${isOpen ? 'open' : ''}">${inner}</div>
  </div>`;
}

// ============ RENDER: CALCULADORAS ============
function renderCalculadoras() {
  const container = document.getElementById('calcContainer');
  container.innerHTML = CALCULADORAS.map(c => `
    <div class="calc-card">
      <h4>${c.icon} ${escapeHtml(c.titulo)}</h4>
      <div class="calc-desc">${escapeHtml(c.desc)}</div>
      <div class="calc-grid">
        ${c.fields.map(f => `
          <div class="calc-field">
            <label>${escapeHtml(f.label)}</label>
            <input id="calc-${c.id}-${f.id}" type="${f.type === 'text' ? 'text' : 'number'}" step="0.01" placeholder="${escapeHtml(f.placeholder)}">
          </div>`).join('')}
      </div>
      <button class="calc-btn" data-calc="${c.id}">Calcular</button>
      <div class="calc-result" id="calc-result-${c.id}"></div>
    </div>
  `).join('');

  container.querySelectorAll('.calc-btn').forEach(btn => {
    btn.addEventListener('click', () => runCalc(btn.dataset.calc));
  });
}

function getVal(calcId, fieldId) {
  const el = document.getElementById(`calc-${calcId}-${fieldId}`);
  return el ? el.value : '';
}

function showCalcResult(calcId, html, isErr) {
  const res = document.getElementById(`calc-result-${calcId}`);
  res.innerHTML = html;
  res.classList.add('show');
  res.classList.toggle('err', !!isErr);
}

function runCalc(calcId) {
  if (calcId === 'calado') return calcCalado();
  if (calcId === 'guinda') return calcGuinda();
  if (calcId === 'rumbo') return calcRumbo();
  if (calcId === 'vdt') return calcVDT();
  if (calcId === 'marea') return calcMarea();
  if (calcId === 'cadena') return calcCadena();
  if (calcId === 'escala') return calcEscala();
}

function calcCalado() {
  const cpr = parseFloat(getVal('calado', 'cpr'));
  const cpp = parseFloat(getVal('calado', 'cpp'));
  const cm = parseFloat(getVal('calado', 'cmedio'));
  if (isNaN(cpr) || isNaN(cpp)) {
    return showCalcResult('calado', 'Ingresa al menos calado de proa y popa.', true);
  }
  const CM = (cpr + cpp) / 2;
  const asiento = cpp - cpr;
  const aDir = asiento >= 0 ? 'apopante (+)' : 'aproante (−)';
  let esf = '';
  if (!isNaN(cm)) {
    const e = cm - CM;
    esf = `<br><strong>Esfuerzo long.:</strong> ${e.toFixed(3)} m (${e >= 0 ? 'arrufo ↑' : 'quebranto ↓'})`;
  }
  showCalcResult('calado', `<strong>Calado medio:</strong> ${CM.toFixed(3)} m<br><strong>Asiento:</strong> ${Math.abs(asiento).toFixed(3)} m ${aDir}${esf}`);
}

function calcGuinda() {
  const alturaTope = parseFloat(getVal('guinda', 'alturaTope'));
  const caladoActual = parseFloat(getVal('guinda', 'caladoActual'));
  const alturaLibre = parseFloat(getVal('guinda', 'alturaLibreCarta'));
  if (isNaN(alturaTope) || isNaN(alturaLibre)) {
    return showCalcResult('guinda', 'Ingresa al menos la altura del tope y la altura libre en carta.', true);
  }
  const margen = alturaLibre - alturaTope;
  const seguro = margen > 0;
  let extra = '';
  if (!isNaN(caladoActual)) {
    extra = `<br><strong>Calado actual:</strong> ${caladoActual.toFixed(2)} m (verificar con la marea presente, no con datos de carta en bajamar de sicigias)`;
  }
  showCalcResult('guinda',
    `<strong>Margen disponible:</strong> ${margen.toFixed(2)} m<br><strong>Condición:</strong> ${seguro ? '✅ Paso seguro (margen positivo)' : '⚠️ RIESGO — guinda excede altura libre'}${extra}`,
    !seguro
  );
}

function calcRumbo() {
  const rv = parseFloat(getVal('rumbo', 'rv'));
  const vari = parseFloat(getVal('rumbo', 'varv')) || 0;
  const desv = parseFloat(getVal('rumbo', 'desv')) || 0;
  if (isNaN(rv)) {
    return showCalcResult('rumbo', 'Ingresa el rumbo verdadero.', true);
  }
  const rm = ((rv - vari) + 360) % 360;
  const rc = ((rm - desv) + 360) % 360;
  showCalcResult('rumbo', `<strong>RV:</strong> ${rv.toFixed(1)}°  →  <strong>RM:</strong> ${rm.toFixed(1)}°  →  <strong>RC:</strong> ${rc.toFixed(1)}°<br><small>Gobernar rumbo de compás: <strong>${rc.toFixed(1)}°</strong></small>`);
}

function calcVDT() {
  const v = parseFloat(getVal('vdt', 'v'));
  const d = parseFloat(getVal('vdt', 'd'));
  const t = parseFloat(getVal('vdt', 't'));
  let result = '';
  if (isNaN(v) && !isNaN(d) && !isNaN(t)) {
    result = `Velocidad = ${(d / t).toFixed(2)} nudos`;
  } else if (isNaN(d) && !isNaN(v) && !isNaN(t)) {
    result = `Distancia = ${(v * t).toFixed(2)} millas náuticas`;
  } else if (isNaN(t) && !isNaN(v) && !isNaN(d)) {
    const tiempo = d / v;
    const horas = Math.floor(tiempo);
    const mins = Math.round((tiempo - horas) * 60);
    result = `Tiempo = ${tiempo.toFixed(2)} horas (${horas}h ${mins}min)`;
  } else {
    return showCalcResult('vdt', 'Deja en blanco solo el campo que quieres calcular.', true);
  }
  showCalcResult('vdt', `<strong>${result}</strong>`);
}

function calcMarea() {
  const bm = parseFloat(getVal('marea', 'bm'));
  const pm = parseFloat(getVal('marea', 'pm'));
  const hbmStr = getVal('marea', 'hbm');
  const hconsStr = getVal('marea', 'hcons');
  if (isNaN(bm) || isNaN(pm) || !hbmStr || !hconsStr) {
    return showCalcResult('marea', 'Completa todos los campos.', true);
  }
  const parseH = s => { const [h, m] = s.split(':').map(Number); return h + (m || 0) / 60; };
  const hBM = parseH(hbmStr);
  const hCons = parseH(hconsStr);
  const amplitud = pm - bm;
  let dt = hCons - hBM;
  if (dt < 0) dt += 24;
  const ciclo = 6.2;
  const fracs = [1, 2, 3, 3, 2, 1];
  let frac12 = 0;
  const horasPorSexto = ciclo / 6;
  let hRestante = dt;
  for (let i = 0; i < 6 && hRestante > 0; i++) {
    const consume = Math.min(hRestante, horasPorSexto);
    frac12 += fracs[i] * (consume / horasPorSexto);
    hRestante -= consume;
  }
  const subida = (frac12 / 12) * amplitud;
  const altura = bm + subida;
  showCalcResult('marea', `<strong>Amplitud:</strong> ${amplitud.toFixed(2)} m<br><strong>Tiempo desde BM:</strong> ${dt.toFixed(2)} h<br><strong>Altura estimada:</strong> <span style="font-size:18px;font-weight:800">${Math.max(bm, Math.min(pm, altura)).toFixed(2)} m</span><br><small>Método: Regla de los Doce (aproximado)</small>`);
}

function calcCadena() {
  const prof = parseFloat(getVal('cadena', 'prof'));
  const tiempoCode = getVal('cadena', 'tiempo').trim();
  if (isNaN(prof)) {
    return showCalcResult('cadena', 'Ingresa la profundidad.', true);
  }
  const malTiempo = tiempoCode === '2';
  const factorMin = malTiempo ? 5 : 3;
  const factorMax = malTiempo ? 6 : 4;
  const minM = prof * factorMin;
  const maxM = prof * factorMax;
  const minPanos = (minM / 27.5).toFixed(1);
  const maxPanos = (maxM / 27.5).toFixed(1);
  showCalcResult('cadena', `<strong>Condición:</strong> ${malTiempo ? 'Mal tiempo (5–6×)' : 'Buen tiempo (3–4×)'}<br><strong>Cadena a largar:</strong> ${minM.toFixed(1)}–${maxM.toFixed(1)} m<br><strong>Paños (27,5 m c/u):</strong> ${minPanos}–${maxPanos} paños`);
}

function calcEscala() {
  const dcm = parseFloat(getVal('escala', 'dcm'));
  const escala = parseFloat(getVal('escala', 'escala'));
  if (isNaN(dcm) || isNaN(escala)) {
    return showCalcResult('escala', 'Completa ambos campos.', true);
  }
  const metros = (dcm * escala) / 100;
  const km = metros / 1000;
  const mn = metros / 1852;
  showCalcResult('escala', `<strong>Distancia real:</strong><br>${metros.toLocaleString('es-CL')} m = ${km.toFixed(3)} km = ${mn.toFixed(3)} millas náuticas`);
}

// ============ RENDER MASTER ============
function render() {
  renderTabs();
  showPage(currentPage);
  renderHeaderStats();
  if (currentPage === 'checklist') renderChecklist();
  if (currentPage === 'referencia') renderReferencia();
  if (currentPage === 'calculadoras') renderCalculadoras();
}

// ============ EVENTS ============
document.getElementById('searchInput').addEventListener('input', (e) => {
  searchTerm = e.target.value;
  if (searchTerm && currentPage !== 'checklist') {
    currentPage = 'checklist';
  }
  render();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('¿Iniciar una nueva guardia? Esto borrará todo el progreso marcado.')) {
    Object.keys(checkState).forEach(k => checkState[k] = false);
    saveState();
    render();
  }
});

document.getElementById('themeBtn').addEventListener('click', toggleTheme);

// ============ INIT ============
initTheme();
updateClock();
setInterval(updateClock, 1000);
loadState();

// PWA: registrar service worker para uso offline e instalación
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
